services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: beeplan
      POSTGRES_PASSWORD: beeplan
      POSTGRES_DB: beeplan
    ports:
      - "5432:5432"
    volumes:
      - beeplan_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beeplan -d beeplan"]
      interval: 5s
      timeout: 5s
      retries: 10

  builder:
    build:
      context: ..
      dockerfile: beeplan-builder/Dockerfile
    ports:
      - "9000:9000"
    volumes:
      - firmware_artifacts:/artifacts
      - firmware_workdir:/workdir
      # Dev: pick up firmware source changes without rebuilding the image
      - ../beeplan-gateway:/firmware/gateway
      - ../beeplan-edge:/firmware/edge
      - ../beeplan-builder/builder:/app/builder
    environment:
      BEEPLAN_BUILDER_SECRET: dev-builder-secret
      BEEPLAN_WORKDIR: /workdir

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://beeplan:beeplan@db:5432/beeplan
      JWT_SECRET: dev-secret-change-in-production
      BUILDER_URL: http://builder:9000
      BUILDER_SECRET: dev-builder-secret
      PUBLIC_API_BASE_URL: http://host.docker.internal:8000
      FIRMWARE_BUILDS_PER_HOUR: 60
    depends_on:
      db:
        condition: service_healthy
      builder:
        condition: service_started

volumes:
  beeplan_pg:
  firmware_artifacts:
  firmware_workdir:
